<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#111111">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <title>Pump Logger</title>
</head>
<body class="split-page">
    <main class="split-shell" aria-labelledby="split-title">
        <header class="split-header">
            <p class="eyebrow">Pump Logger</p>
            <h1 id="split-title">Choose the split</h1>
        </header>

        <section id="button-container" class="split-grid" aria-label="Workout split">
            <button class="split-button" type="button" data-group="chestBack">
                <span>Chest / Back</span>
                <small>Press</small>
            </button>
            <button class="split-button" type="button" data-group="legs">
                <span>Legs</span>
                <small>Lower</small>
            </button>
            <button class="split-button" type="button" data-group="shoulders">
                <span>Shoulders</span>
                <small>Delts</small>
            </button>
            <button class="split-button" type="button" data-group="arms">
                <span>Arms</span>
                <small>Curls</small>
            </button>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
