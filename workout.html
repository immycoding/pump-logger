<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#111111">
    <title>Workout Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="workout-page">
    <main class="logger-shell" aria-labelledby="workout-header">
        <header class="logger-header">
            <a class="back-link" href="index.html" aria-label="Back to split">Back</a>
            <p class="eyebrow">Today</p>
            <h1 id="workout-header">Workout</h1>
        </header>

        <form id="workoutForm" class="logger-form" autocomplete="off">
            <div class="field">
                <label for="exercise-dropdown">Exercise</label>
                <select id="exercise-dropdown" name="exercise" required></select>
            </div>

            <div id="last-workout" class="last-workout" aria-live="polite">
                Pick an exercise to see last performance.
            </div>

            <div class="set-grid">
                <div class="field">
                    <label for="weight">Weight</label>
                    <input type="number" id="weight" name="weight" inputmode="decimal" min="0" step="0.5" required>
                </div>

                <div class="field">
                    <label for="reps">Reps</label>
                    <input type="number" id="reps" name="reps" inputmode="numeric" min="1" step="1" required>
                </div>
            </div>

            <button class="primary-action" type="submit">Log set</button>
            <p id="form-status" class="form-status" role="status" aria-live="polite"></p>
        </form>
    </main>

    <script src="script.js"></script>
</body>
</html>
